model_arch: stateless_transformer_v1
embed_dim: 384
depth: 10
n_heads: 12
mlp_ratio: 2.0
n_scratch_tokens: 4
activation: swiglu
force_flash_attn: true
actor:
  action_spec: discrete_targets
  n_action_mixtures: 8
  max_ship_normalizer: 500.0
  entropy_ship_quantiles: 16
  scale_min: 0.10
  scale_max_frac: 0.5
  scale_max_abs_floor: 8.0
