env:
  n_envs: 256
  obs_spec:
    obs_spec: entity_based_ext_v2
    max_entities: 192
  action_spec:
    action_spec: discrete_targets
    min_fleet_size: 3
    targeting_mode: full_mask
  two_player_weight: 0.5
  pin_memory: true

model: stateless_transformer_200m_d38

optimizer:
  optimizer: muon
  adamw_lr: 1.0e-05
  adamw_eps: 1.0e-05
  weight_decay: 0.0
  muon_lr: 2.0e-04
  muon_weight_decay: 0.01
  muon_momentum: 0.95
  lr_schedule:
    schedule: linear_warmup_cosine_decay
    warmup_steps: 500
    decay_steps: 150_000
    lr_min_ratio: 0.01

rl:
  horizon: 64
  checkpoint_freq: 20_000_000
  ppo_epochs: 1
  segments_per_minibatch: 16
  gradient_accumulation_steps: 1
  # gamma=1.0 keeps the critic softmax well-defined
  gamma: 1.0
  gae_lambda: 0.9
  clip_coef: 0.2
  vf_clip_coef: null
  vf_coef: 2.0
  ent_coef: 1e-6
  max_grad_norm: 10.0
  target_kl: null
  ppo_clip_mode: per_player
  normalize_advantages: true
  eval_replay_games: 8
  teacher_mode: last_best
  teacher_kl_coef: 0.0025
  teacher_value_coef: 0.0025
  teacher_segments_per_minibatch: 32
  compile_mode: default
  dtype: bfloat16
