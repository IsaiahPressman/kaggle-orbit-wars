env:
  n_envs: 2048
  action_spec:
    action_spec: discrete_targets
    max_per_planet_launches: 1
    min_fleet_size: 6

model: stateless_transformer_5m

optimizer:
  optimizer: muon
  adamw_lr: 0.0003
  muon_lr: 0.015

rl:
  horizon: 128
  checkpoint_freq: null
  gamma: 0.995
  gae_lambda: 0.9
  replay_ratio: 2.0
  target_kl: 0.03
  advantage_mode: puffer_vtrace
  vtrace_rho_clip: 1.0
  vtrace_c_clip: 1.0
  recompute_advantages_each_minibatch: true
  normalize_advantages: true
  eval_replay_games: 8
  dtype: bfloat16
  segment_sampling:
    sampling: advantage_priority
    segments_per_minibatch: 16
    prio_alpha: 0.5
    prio_beta: 0.2
