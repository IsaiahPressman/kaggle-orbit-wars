env:
  n_envs: 2048

model: stateless_transformer_5m

optimizer:
  optimizer: muon
  adamw_lr: 0.0003
  muon_lr: 0.015

rl:
  horizon: 128
  checkpoint_freq: 0
  gamma: 0.995
  gae_lambda: 0.95
  replay_ratio: 1.0
  clip_coef: 0.2
  vf_clip_coef: 0.2
  vf_coef: 0.5
  ent_coef: 0.003
  max_grad_norm: 1.0
  target_kl: 0.03
  advantage_mode: gae
  recompute_advantages_each_minibatch: false
  segment_sampling:
    sampling: uniform
    segments_per_minibatch: 16
