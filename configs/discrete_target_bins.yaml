env:
  n_envs: 256
  obs_spec:
    obs_spec: entity_based
    max_entities: 256
  action_spec:
    action_spec: discrete_target_bins
    min_fleet_size: 6
    n_bins: 5
    targeting_mode: anything_goes
  two_player_weight: 0.5
  pin_memory: true

model: stateless_transformer_20m_swiglu_discrete_targets

optimizer:
  optimizer: muon
  adamw_lr: 0.0002
  adamw_eps: 1.0e-05
  weight_decay: 0.0
  muon_lr: 0.005
  muon_weight_decay: 0.05
  muon_momentum: 0.95
  lr_schedule:
    schedule: linear_warmup_cosine_decay
    warmup_steps: 200
    decay_steps: 100_000
    lr_min_ratio: 0.1

rl:
  horizon: 128
  checkpoint_freq: 20_000_000
  ppo_epochs: 1
  segments_per_minibatch: 16
  # gamma=1.0 keeps the critic softmax well-defined
  gamma: 1.0
  gae_lambda: 0.9
  clip_coef: 0.2
  vf_clip_coef: null
  vf_coef: 2.0
  ent_coef: 2e-5
  max_grad_norm: 1.0
  target_kl: null
  normalize_advantages: true
  eval_replay_games: 8
  compile_mode: default
  dtype: bfloat16
