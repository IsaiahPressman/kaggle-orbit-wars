env:
  n_envs: 256
  obs_spec:
    obs_spec: entity_based
    max_entities: 512
  action_spec:
    action_spec: discrete_target_bins
    min_fleet_size: 
    n_bins: 5
  two_player_weight: 0.5
  pin_memory: true

model: stateless_transformer_20m_swiglu

optimizer:
  optimizer: muon
  adamw_lr: 0.0005
  adamw_eps: 1.0e-05
  weight_decay: 0.0
  muon_lr: 0.01
  muon_weight_decay: 0.05
  muon_momentum: 0.95
  lr_schedule:
    schedule: linear_warmup_cosine_decay
    warmup_steps: 1000
    decay_steps: 500_000
    lr_min_ratio: 0.1

rl:
  horizon: 128
  checkpoint_freq: 20_000_000
  replay_ratio: 1.0
  segment_sampling:
    sampling: uniform
    segments_per_minibatch: 16
  # gamma=1.0 keeps the critic softmax well-defined
  gamma: 1.0
  gae_lambda: 0.9
  clip_coef: 0.2
  vf_clip_coef: null
  vf_coef: 2.0
  ent_coef: 2e-5
  max_grad_norm: 1.0
  target_kl: 0.1
  advantage_mode: gae
  recompute_advantages_each_minibatch: false
  normalize_advantages: true
  debug_validate_ppo_loss_inputs: false
  eval_replay_games: 8
  compile_mode: default
  dtype: bfloat16
