# Truncation experiment 1: ship-ratio reward + independent per-player critic,
# with games soft-truncated at step 200 (same truncation as exp2). The winner(s)
# receive winner_ships / total_player_ships and everyone else 0; the independent
# sigmoid critic represents this non-zero-sum return. teacher_value_coef must be
# 0 (winner-probability value distillation is incompatible with the independent
# critic); teacher action-KL distillation is kept. One B200.
env:
  n_envs: 512
  obs_spec:
    obs_spec: entity_based_ext_v2
    max_entities: 256
  action_spec:
    action_spec: discrete_targets
    min_fleet_size: 3
    targeting_mode: anything_goes
  two_player_weight: 0.5
  reward_mode: ship_ratio
  pin_memory: true

model: stateless_transformer_6m_independent_critic

optimizer:
  optimizer: muon
  adamw_lr: 0.0001
  adamw_eps: 1.0e-05
  weight_decay: 0.0
  muon_lr: 0.002
  muon_weight_decay: 0.05
  muon_momentum: 0.95
  lr_schedule:
    schedule: linear_warmup_cosine_decay
    warmup_steps: 200
    decay_steps: 150_000
    lr_min_ratio: 0.02

rl:
  horizon: 128
  checkpoint_freq: 20_000_000
  ppo_epochs: 1
  segments_per_minibatch: 32
  gradient_accumulation_steps: 1
  # ship-ratio returns are bounded in [0, 1]; gamma=1.0 keeps them well-scaled.
  gamma: 1.0
  gae_lambda: 0.9
  clip_coef: 0.2
  vf_clip_coef: null
  vf_coef: 2.0
  ent_coef: 1e-6
  max_grad_norm: 10.0
  target_kl: null
  ppo_clip_mode: per_player
  normalize_advantages: true
  eval_replay_games: 8
  teacher_mode: last_best
  teacher_kl_coef: 0.005
  teacher_value_coef: 0.0
  teacher_segments_per_minibatch: 256
  compile_mode: default
  dtype: bfloat16
  truncation_step: 200
  truncation_prob: 0.9
